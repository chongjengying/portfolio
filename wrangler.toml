# Cloudflare Pages — static site (Next.js `output: "export"`).
# Use ONLY: npx wrangler pages deploy   OR   npm run pages:deploy
# Do NOT run `wrangler deploy` — that targets Workers and will warn / break for Pages projects.
#
# 1) Create the project once: npx wrangler pages project create <name> --production-branch main
# 2) Set `name` below to match, then: npm run pages:publish

name = "cjy-portfolio"
compatibility_date = "2026-03-28"
pages_build_output_dir = "./out"
